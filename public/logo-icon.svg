<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" fill="none" role="img" aria-label="Cowbell Keystone icon">
  <!-- Background: dark green rounded square -->
  <rect width="60" height="60" rx="4" fill="#0D3B2E"/>
  <!-- K letterform: vertical stem -->
  <rect x="16" y="12" width="7" height="36" rx="1.5" fill="white"/>
  <!-- K upper arm -->
  <polygon points="22,30 41,12 49,12 30,30" fill="white"/>
  <!-- K lower arm -->
  <polygon points="22,30 41,48 49,48 30,30" fill="white"/>
  <!-- Green accent dot at K junction -->
  <circle cx="26" cy="30" r="2.5" fill="#2A9D6F"/>
</svg>
